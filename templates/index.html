<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>PVD Stego System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: { dark: '#050505', panel: '#111827', green: '#22c55e' }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #22c55e; border-radius: 4px; }
        
        .tab-btn.active { border-bottom-color: #22c55e; color: #22c55e; }
        .tab-btn { border-bottom-color: transparent; color: #4b5563; }
    </style>
</head>
<body class="bg-cyber-dark text-green-500 font-mono min-h-screen p-4 md:p-8 selection:bg-green-500 selection:text-black">
    <div class="max-w-4xl mx-auto bg-cyber-panel border border-green-800/50 rounded shadow-[0_0_20px_rgba(34,197,94,0.1)] p-6">
        
        <h2 class="text-2xl md:text-3xl font-bold mb-6 border-b border-green-900 pb-4 text-center tracking-widest text-green-400">
            [ PVD_STEGOGRAPHY ]
        </h2>

        <div class="flex border-b border-gray-800 mb-6">
            <button onclick="switchTab('calc')" id="btn-calc" class="tab-btn active px-4 py-2 border-b-2 font-bold transition-all hover:text-green-400">
                ~/калькулятор
            </button>
            <button onclick="switchTab('image')" id="btn-image" class="tab-btn px-4 py-2 border-b-2 font-bold transition-all hover:text-green-400">
                ~/обробка_зображення
            </button>
        </div>

        <div id="tab-calc" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-xs mb-1 text-gray-500">Pixel 1 [0-255]</label>
                    <input type="number" id="p1" value="150" class="w-full bg-black border border-green-900 rounded px-3 py-2 text-green-400 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs mb-1 text-gray-500">Pixel 2 [0-255]</label>
                    <input type="number" id="p2" value="185" class="w-full bg-black border border-green-900 rounded px-3 py-2 text-green-400 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs mb-1 text-gray-500">Символ (1 знак)</label>
                    <input type="text" id="char" value="D" maxlength="1" class="w-full bg-black border border-green-900 rounded px-3 py-2 text-green-400 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-colors">
                </div>
                <div>
                    <button onclick="calcPVD()" class="w-full bg-green-600 hover:bg-green-500 text-black font-bold py-2 px-4 rounded transition-all shadow-[0_0_10px_rgba(34,197,94,0.3)] hover:shadow-[0_0_15px_rgba(34,197,94,0.6)]">
                        >_ EXECUTE
                    </button>
                </div>
            </div>
            <div class="relative">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-green-500/20 to-transparent"></div>
                <pre id="calc-result" class="bg-black border border-green-900/50 p-4 rounded text-sm overflow-x-auto min-h-[150px] text-green-300">Очікування вводу даних...</pre>
            </div>
        </div>

        <div id="tab-image" class="hidden space-y-6">
            <div class="p-4 border border-dashed border-green-800 rounded bg-black/50">
                <label class="block text-sm mb-2 text-gray-400 font-bold">Оберіть зображення (cover image):</label>
                <input type="file" id="imageFile" accept=".png,.bmp,.jpg" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-bold file:bg-green-900 file:text-green-400 hover:file:bg-green-800 file:transition-colors cursor-pointer">
            </div>
            
            <div>
                <label class="block text-sm mb-2 text-gray-400 font-bold">Секретне повідомлення (payload):</label>
                <textarea id="secretMsg" rows="5" class="w-full bg-black border border-green-900 rounded px-3 py-2 text-green-400 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-colors resize-y" placeholder="Введіть текст для приховування..."></textarea>
            </div>
            
            <div class="flex flex-col md:flex-row gap-4 pt-2">
                <button onclick="hideData()" class="flex-1 bg-green-600 hover:bg-green-500 text-black font-bold py-3 px-4 rounded transition-all shadow-[0_0_10px_rgba(34,197,94,0.2)] hover:shadow-[0_0_15px_rgba(34,197,94,0.5)] flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    [ СХОВАТИ ДАНІ ]
                </button>
                <button onclick="extractData()" class="flex-1 border border-green-600 text-green-500 hover:bg-green-900/30 font-bold py-3 px-4 rounded transition-all flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path></svg>
                    [ ВИЛУЧИТИ ДАНІ ]
                </button>
            </div>
        </div>
        
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
